name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & lint (both feature configs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - name: Rustfmt
        run: cargo fmt --all --check

      - name: Clippy (default)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test (default)
        run: cargo test

      # The `harness` feature (the `ctl` tester binary) pulls in midir, whose
      # Linux backend needs the ALSA dev headers.
      - name: ALSA headers (for the harness MIDI backend)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Clippy (--features harness)
        run: cargo clippy --all-targets --features harness -- -D warnings

      - name: Test (--features harness)
        run: cargo test --features harness
